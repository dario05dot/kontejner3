name: Compare github-script versions
on: workflow_dispatch

jobs:
  v6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace GITHUB_ENV with FIFO
        run: |
          set -euxo pipefail
          rm -f "$GITHUB_ENV"
          mkfifo "$GITHUB_ENV"
      - name: Start reader
        run: |
          set -euxo pipefail
          (cat < "$GITHUB_ENV" > /tmp/v6.txt) &
          echo $! > /tmp/reader.pid
      - name: Trigger write v6
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('POC_VAR', 'v6')
      - name: Show result
        if: always()
        run: |
          cat /tmp/v6.txt || true

  v7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace GITHUB_ENV with FIFO
        run: |
          set -euxo pipefail
          rm -f "$GITHUB_ENV"
          mkfifo "$GITHUB_ENV"
      - name: Start reader
        run: |
          set -euxo pipefail
          (cat < "$GITHUB_ENV" > /tmp/v7.txt) &
          echo $! > /tmp/reader.pid
      - name: Trigger write v7
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('POC_VAR', 'v7')
      - name: Show result
        if: always()
        run: |
          cat /tmp/v7.txt || true
